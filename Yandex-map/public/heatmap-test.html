<!DOCTYPE html>
<html>
<head>
    <title>Тест тепловой карты Яндекс 3.0</title>
    <style>
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Подключаем API 3.0 с модулем heatmap -->
    <script src="https://api-maps.yandex.ru/v3/?apikey=c7f3ba44-8c30-4715-bed2-9331e6fe6d7a&lang=ru_RU&mode=heatmap"></script>

    <script>
        // Ждём загрузки API
        ymaps3.ready.then(() => {
            const { YMap, YMapDefaultSchemeLayer, YMapHeatmapLayer } = ymaps3;

            // Создаём карту
            const map = new YMap(document.getElementById('map'), {
                location: { center: [37.617644, 55.755819], zoom: 10 }
            });

            // Добавляем базовый слой (схема)
            map.addLayer(new YMapDefaultSchemeLayer());

            // Данные для тепловой карты
            const heatmapData = [
                { coordinates: [37.617634, 55.751244], weight: 10 },
                { coordinates: [37.602602, 55.743265], weight: 8 },
                { coordinates: [37.582879, 55.765895], weight: 15 }
            ];

            // Создаём тепловой слой
            const heatmapLayer = new YMapHeatmapLayer({
                data: heatmapData,
                radius: 30,
                opacity: 0.7,
                colorStops: [
                    { stop: 0, color: 'rgba(0, 100, 255, 0)' },
                    { stop: 0.3, color: 'rgba(0, 200, 255, 0.5)' },
                    { stop: 0.6, color: 'rgba(255, 255, 0, 0.8)' },
                    { stop: 1, color: 'rgba(255, 0, 0, 1)' }
                ]
            });

            // Добавляем тепловой слой на карту
            map.addLayer(heatmapLayer);

            console.log('Тепловая карта добавлена');
        }).catch(err => {
            console.error('Ошибка загрузки API:', err);
        });
    </script>
</body>
</html>
